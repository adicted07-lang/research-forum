<!DOCTYPE html><html><head><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; background: #f7f7f7; color: #21293C; }
.avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #fdba74, #fed7aa); display: flex; align-items: center; justify-content: center; font-size: 32px; border: 3px solid white; overflow:hidden; }
.avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
.badge-green { background: #dcfce7; color: #16a34a; }
.badge-blue { background: #dbeafe; color: #2563eb; }
.badge-orange { background: #ffedd5; color: #ea580c; }
.badge-purple { background: #f3e8ff; color: #9333ea; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; background: rgba(218,85,47,0.08); color: #DA552F; font-weight: 500; }
.stat-num { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 12px; color: #6F7287; }
.card { background: white; border-radius: 12px; border: 1px solid #e8e8e8; padding: 24px; }
.primary { color: #DA552F; }
.btn { padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
.btn-primary { background: #DA552F; color: white; }
.btn-outline { background: white; color: #21293C; border: 1px solid #e8e8e8; }
